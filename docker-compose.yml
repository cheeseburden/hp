version: '3.8'

services:
  # ── Apache Kafka (KRaft mode — Official Apache Image) ──
  kafka:
    image: apache/kafka:3.7.0
    container_name: hpe-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - hpe-network

  # ── Elasticsearch (single-node dev mode) ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: hpe-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hpe-network

  # ── Kibana (log visualization) ──
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: hpe-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - kibana_data:/usr/share/kibana/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hpe-network

  # ── HashiCorp Vault (dev mode) ──
  vault:
    image: hashicorp/vault:latest
    container_name: hpe-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=hpe-dev-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR=http://127.0.0.1:8200
      - SKIP_SETCAP=1
    command: server -dev
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hpe-network

  # ── FastAPI Backend ──
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hpe-backend
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=hpe-dev-token
      - MODEL_PATH=/app/model_output/pipeline_artifacts_v2.joblib
      - TEST_EVENTS_PATH=/app/model_output/test_events.json
      - PROFILES_PATH=/app/model_output/user_profiles.json
    volumes:
      - ./model_output:/app/model_output:ro
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - hpe-network

  # ── Frontend (Vite dev server) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hpe-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - hpe-network

volumes:
  kafka_data:
  es_data:
  kibana_data:


networks:
  hpe-network:
    driver: bridge
